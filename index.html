    <style type="text/css">
      :root {
        --primary-color: #87CEEB;
        --text-color: #333;
      }

      * {
        padding: 0;
        margin: 0;
        box-sizing: inherit;
      }

      body {
        background-color: #f5f5f5;
      }

      html {
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      .player {
        position: relative;
        max-width: 480px;
        margin: 0 auto;
      }

      .player .icon-pause {
        display: none;
      }

      .player.playing .icon-pause {
        display: inline-block;
      }

      .player.playing .icon-play {
        display: none;
      }

      .dashboard {
        padding: 16px 16px 14px;
        background-color: #fff;
        position: fixed;
        top: 0;
        width: 100%;
        max-width: 480px;
        border-bottom: 1px solid #ebebeb;
      }

      /* HEADER */
      header {
        text-align: center;
        margin-bottom: 5px;
      }

      header h4 {
        color: var(--primary-color);
        font-size: 12px;
      }

      header h2 {
        color: var(--text-color);
        font-size: 20px;
      }

      /* CD */
      .cd {
        display: flex;
        margin: auto;
        width: 160px;
      }

      .cd-thumb {
        width: 100%;
        padding-top: 85%;
        background-size: cover;
        margin: auto;
      }

      /* CONTROL */
      .control {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 18px 0 8px 0;
      }

      .control .btn {
        color: #666;
        padding: 18px;
        font-size: 18px;
      }

      .control .btn.active {
        color: var(--primary-color);
      }

      .control .btn-toggle-play {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        font-size: 24px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--primary-color);
      }

      .progress {
        width: 100%;
        -webkit-appearance: none;
        height: 6px;
        background: #d3d3d3;
        outline: none;
        opacity: 0.7;
        -webkit-transition: 0.2s;
        transition: opacity 0.2s;
      }

      .progress::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        border-radius: 12px;
        width: 14px;
        height: 12px;
        background-color: var(--primary-color);
        cursor: pointer;
      }

      .duration {
        display: flex;
      }

      .duration .current-duration {
        font-size: 14px;
      }

      .duration .total-duration {
        font-size: 14px;
        margin-left: auto; 
        margin-right: 0;
      }

      /* PLAYLIST */
      .playlist {
        margin-top: 408px;
        padding: 12px;
      }

      .song {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        background-color: #fff;
        padding: 8px 16px;
        border-radius: 5px;
        box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
      }

      .song.active {
        background-color: var(--primary-color);
      }

      .song:active {
        opacity: 0.8;
      }

      .song.active .option,
      .song.active .author,
      .song.active .title {
        color: #fff;
      }

      .song .thumb {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background-color: #ccc;
        text-align: center;
        color: #fff;
        font-weight: bold;
        margin: 0 8px;
        padding-top: 10px;
      }

      .song .body {
        flex: 1;
        padding: 0 16px;
      }

      .song .title {
        font-size: 18px;
        color: var(--text-color);
      }

      .song .author {
        font-size: 12px;
        color: #999;
      }

      .song .option {
        padding: 16px 8px;
        color: #999;
        font-size: 18px;
      }
    </style>

        render() {
          playlist.innerHTML = this.songs
            .map((song, index) => `
              <div class="song ${index === this.currentIndex ? "active" : ""}" data-index="${index}">
                <div class="thumb"><span>${song.id}</span></div>
                <div class="body">
                  <h3 class="title">${song.transliteration} <span class="author">(${song.translation})</span></h3>

              </div>

            const scrollTop = window.scrollY;
            const newCdWidth = cdWidth - scrollTop;
            cd.style.width = newCdWidth > 0 ? newCdWidth + 'px' : 0;
            cd.style.opacity = (newCdWidth / cdWidth) > 0 ? newCdWidth / cdWidth : 0;
          });

          playBtn.onclick = () => (this.isPlaying ? audio.pause() : audio.play());

          audio.onloadedmetadata = () => {
            totalDur.textContent = convertTime(audio.duration);
          };

          audio.onplay = () => {
            this.isPlaying = true;
            player.classList.add("playing");
          };

          audio.onpause = () => {
            this.isPlaying = false;
            player.classList.remove("playing");
          };

          audio.ontimeupdate = () => {
            if (audio.duration) {
              const percent = Math.floor(audio.currentTime / audio.duration * 100);
              progress.value = percent;
              currentDur.textContent = convertTime(audio.currentTime);
            }
          };

          progress.onchange = e => {
            audio.currentTime = audio.duration * e.target.value / 100;
          };

          nextBtn.onclick = () => {
            this.isRandom ? this.playRandomSong() : this.nextSong();
            this.render();
            this.scrollToActiveSong();
            audio.play();
          };

          prevBtn.onclick = () => {
            this.isRandom ? this.playRandomSong() : this.prevSong();
            this.render();
            audio.play();
          };

          randomBtn.onclick = () => {
            this.isRandom = !this.isRandom;
            this.setConfig("isRandom", this.isRandom);
            randomBtn.classList.toggle("active", this.isRandom);
          };

          repeatBtn.onclick = () => {
            this.isRepeat = !this.isRepeat;
            this.setConfig("isRepeat", this.isRepeat);
            repeatBtn.classList.toggle("active", this.isRepeat);
          };

          recitation.onchange = () => {
            this.urlReciter = recitation.value;
            this.loadCurrentSong();
          };

          audio.onended = () => {
            this.isRepeat ? audio.play() : nextBtn.click();
          };

          playlist.onclick = e => {
            const node = e.target.closest('.song');
            if (!node) return;
            this.currentIndex = Number(node.dataset.index);
            currentDur.textContent = "0:00";
            totalDur.textContent = "0:00";
            this.loadCurrentSong();
            this.render();
            audio.play();
          };
        },

        scrollToActiveSong() {
          setTimeout(() => {
            $(".song.active")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }, 400);
        },

        loadCurrentSong() {
          heading.textContent = this.currentSong.transliteration;
          subHeading.textContent = `${this.currentSong.location} • ${this.currentSong.num_ayah} Ayat`;

          const s = String(this.currentSong.id).padStart(3, "0");

          if (this.urlReciter.includes('$')) {
            audio.src = `https://download.quranicaudio.com/${this.urlReciter.replace('$', s)}.mp3`;
          } else if (this.urlReciter.includes('#')) {
            audio.src = `https://download.quranicaudio.com/${this.urlReciter.replace('#', this.currentSong.id)}.mp3`;
          } else {
            audio.src = `https://download.quranicaudio.com/${this.urlReciter}${s}.mp3`;
          }
        },

        loadConfig() {
          this.isRandom = this.config.isRandom || false;
          this.isRepeat = this.config.isRepeat || false;
        },

        nextSong() {
          this.currentIndex = (this.currentIndex + 1) % this.songs.length;
          this.loadCurrentSong();
        },

        prevSong() {
          this.currentIndex = (this.currentIndex - 1 + this.songs.length) % this.songs.length;
          this.loadCurrentSong();
        },

        playRandomSong() {
          let newIndex;
          do newIndex = Math.floor(Math.random() * this.songs.length);
          while (newIndex === this.currentIndex);

          this.currentIndex = newIndex;
          this.loadCurrentSong();
        },

        start() {
          this.loadConfig();
          this.defineProperties();
          this.handleEvents();
          this.loadCurrentSong();
          this.render();
          randomBtn.classList.toggle("active", this.isRandom);
          repeatBtn.classList.toggle("active", this.isRepeat);
        },
      };

      app.start();
    </script>
  </body>
</html>
